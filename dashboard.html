<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | JewelBill Pro</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap"
        rel="stylesheet">
    <!-- JWT Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.5.24/jsrsasign-all-min.js"></script>
    <script>
        // AUTH GUARD
        (function () {
            const SECRET = "jewel-bill-pro-2024-secret-key";
            const token = localStorage.getItem('jewel_auth_token');

            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const isValid = KJUR.jws.JWS.verify(token, { utf8: SECRET }, ["HS256"]);
                if (!isValid) throw new Error("Invalid Token");

                const payload = KJUR.jws.JWS.readSafeJSONString(b64utoutf8(token.split(".")[1]));
                if (payload.exp < KJUR.jws.IntDate.get("now")) {
                    throw new Error("Token Expired");
                }
            } catch (err) {
                localStorage.removeItem('jewel_auth_token');
                window.location.href = 'login.html';
            }
        })();

        function logout() {
            localStorage.removeItem('jewel_auth_token');
            window.location.href = 'login.html';
        }
    </script>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: rgba(26, 29, 35, 0.8);
            --border-color: #333b47;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-gold: #fbbf24;
            --accent-blue: #3b82f6;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 20% 20%, rgba(251, 191, 36, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            text-align: center;
            z-index: 1;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            color: var(--accent-gold);
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 3rem;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .selection-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 600px) {
            .selection-grid {
                grid-template-columns: 1fr;
            }
        }

        .option-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .option-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .option-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent-gold);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(251, 191, 36, 0.1);
        }

        .option-card:hover::before {
            opacity: 1;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            transition: all 0.4s;
            color: var(--accent-gold);
        }

        .option-card:hover .icon-circle {
            background: var(--accent-gold);
            color: #000;
            transform: rotate(10deg);
        }

        .option-card h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
            color: #fff;
        }

        .option-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .logout-btn {
            margin-top: 4rem;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.75rem 2rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: #ef4444;
        }

        /* Abstract shapes */
        .shape {
            position: fixed;
            z-index: 0;
            filter: blur(80px);
            border-radius: 50%;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: rgba(251, 191, 36, 0.1);
            top: -100px;
            right: -100px;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: rgba(59, 130, 246, 0.1);
            bottom: -50px;
            left: -50px;
        }
    </style>
</head>

<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="container">
        <div class="logo">JewelBill Pro</div>
        <p class="subtitle">SELECT YOUR WORKSPACE</p>

        <div class="selection-grid">
            <a href="index.html" class="option-card">
                <div class="icon-circle">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <h2>Invoice</h2>
                <p>Standard GST billing and inventory tracking system.</p>
            </a>

            <a href="making_invoice.html" class="option-card">
                <div class="icon-circle">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                    </svg>
                </div>
                <h2>Making Invoice</h2>
                <p>Create specialized labor and making charge invoices.</p>
            </a>
        </div>

        <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
</body>

</html>
